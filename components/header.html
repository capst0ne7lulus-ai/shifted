<!-- ============================================================
     components/header.html
     Header component reference markup for Shifted. Dashboard
     (Assembled inside dashboard.html)
     ============================================================ -->
<header class="header">

  <!-- Brand -->
  <a class="header-brand" href="#">
    <div class="brand-mark">
      <!-- Shifted logo mark (grid of dots) -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    <div class="brand-info">
      <span class="brand-name">Shifted.</span>
      <span class="brand-sub">Where Datum Meets Their Upgrade</span>
    </div>
  </a>

  <!-- Navigation -->
  <nav class="header-nav">
    <span class="nav-item">Products</span>
    <span class="nav-item">Solutions</span>
    <span class="nav-item">Community</span>
    <span class="nav-item">Resources</span>
    <span class="nav-item">Pricing</span>
    <span class="nav-item">Contact</span>
    <span class="nav-item">Link</span>
  </nav>

  <!-- Actions -->
  <div class="header-actions">
    <button class="btn-exit">Keluar Dashboard</button>
    <button class="btn-avatar" title="Profil Pengguna">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-3.866 3.582-7 8-7s8 3.134 8 7"/>
      </svg>
    </button>
  </div>

</header>
