<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shifted. | Login</title>
  <link rel="icon" id="favicon" type="image/png" href="image/Logo.png">
  <script>(function(){var c=document.createElement('canvas');c.width=c.height=64;var x=c.getContext('2d');x.fillStyle='#fff';x.beginPath();x.arc(32,32,32,0,Math.PI*2);x.fill();var i=new Image();i.onload=function(){x.drawImage(i,6,6,52,52);document.getElementById('favicon').href=c.toDataURL();};i.src='image/Logo.png';})();</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      background-image: url('image/Landing.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Dark overlay di atas background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 26, 0.62);
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    /* ── Card ── */
    .login-card {
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 22px;
      padding: 44px 40px 40px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.40),
        0 4px 16px rgba(0,0,0,0.20);
    }

    /* ── Logo ── */
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
      padding-bottom: 28px;
      border-bottom: 1.5px solid #eef0f6;
    }
    .login-brand img.logo-mark {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }
    .login-brand img.logo-name {
      height: 42px;
      object-fit: contain;
    }

    /* ── Heading ── */
    .login-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1d2e;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }
    .login-sub {
      font-size: 12px;
      color: #9aa0b4;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* ── Fields ── */
    .field { margin-bottom: 16px; }
    .field-label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      color: #5a6278;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }
    .field-input {
      width: 100%;
      padding: 12px 15px;
      border: 1.5px solid #e4e7ee;
      border-radius: 10px;
      font-size: 13.5px;
      font-family: 'Sora', sans-serif;
      color: #1a1d2e;
      background: #fafbfc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .field-input:focus {
      border-color: #4f5ef7;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(79,94,247,0.12);
    }
    .field-input::placeholder { color: #c5cad8; }

    /* ── Error ── */
    .login-error {
      display: none;
      background: #fff1f1;
      border: 1.5px solid #fca5a5;
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 12px;
      color: #dc2626;
      margin-bottom: 16px;
      font-weight: 500;
      line-height: 1.5;
    }

    /* ── Button ── */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #4f5ef7;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(79,94,247,0.35);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover {
      background: #3d4ce0;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(79,94,247,0.42);
    }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled {
      background: #a5adfa;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <img class="logo-mark" src="image/Logo.png" alt="Logo">
        <img class="logo-name" src="image/Nama.png" alt="Shifted">
      </div>

      <!-- Heading -->
      <div class="login-title">Masuk ke Dashboard</div>
      <div class="login-sub">Gunakan username dan password yang telah diberikan.</div>

      <!-- Error -->
      <div class="login-error" id="login-error"></div>

      <!-- Form -->
      <div class="field">
        <label class="field-label" for="login-user">Username</label>
        <input class="field-input" type="text" id="login-user"
               placeholder="Masukkan nama pengguna"
               autocomplete="username"
               onkeydown="if(event.key==='Enter') document.getElementById('login-pass').focus()">
      </div>

      <div class="field">
        <label class="field-label" for="login-pass">Password</label>
        <input class="field-input" type="password" id="login-pass"
               placeholder="Masukkan password"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter') login()">
      </div>

      <button class="btn-login" id="btn-login" onclick="login()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Masuk
      </button>

    </div>

    <div class="login-footer">Shifted. · Where Datum Meets Their Upgrade</div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();
  </script>

</body>
</html>
